version: '3.8'


services:

 
  app:
    
    build: .

    
    ports:
      - "8080:80"

    
    volumes:
      - .:/var/www/html

    
    depends_on:
      db:
        condition: service_healthy

    
    networks:
      - red_crud

 
  db:
    
    image: mysql:8.0

    
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: biblioteca_videojuegos_db
      MYSQL_USER: mateo
      MYSQL_PASSWORD: "1234"

    
    volumes:
      - datos_mysql:/var/lib/mysql
      
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql


    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "mateo", "-p1234"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - red_crud


networks:
  red_crud:
    driver: bridge


volumes:
  datos_mysql: